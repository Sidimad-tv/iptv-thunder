        @media (max-width: 767px) {

                position: fixed;

        /* Player Modal styles */
        #playerModal video { width:100% !important; height:100% !important; object-fit:fill !important; }

        .player-btn:not(.active):hover { background:#27272a; color:white; }

        .loader-dots span:nth-child(2) { animation-delay:0.2s; }

<body>
    <div id="root"></div>

    <!-- Player Modal -->
    <dialog id="playerModal" style="width:100vw;height:100vh;" class="p-0 m-0 max-w-none max-h-none">
        <div class="flex flex-col w-full h-full bg-black">
            <div class="flex-1 bg-black relative overflow-hidden" style="min-height:0">
                <div id="playerContainer" style="position:absolute;inset:0;width:100%;height:100%"></div>
                <button onclick="closePlayer()" class="absolute top-4 right-4 bg-black/40 hover:bg-slate-800 text-white w-10 h-10 rounded-full flex items-center justify-center transition backdrop-blur-md z-20 border border-white/10"><i class="fas fa-times"></i></button>
                <div id="playerError" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm hidden z-10 p-8 text-center">
                    <div id="errorViewContent">
                        <div class="w-16 h-16 rounded-full bg-red-900/30 flex items-center justify-center mx-auto mb-4 text-red-500"><i class="fas fa-exclamation-triangle text-3xl"></i></div>
                        <h3 class="font-bold text-xl mb-2 text-white" id="errorTitle">Playback Error</h3>
                        <p class="text-sm text-slate-400 max-w-md mx-auto mb-6" id="errorDesc">...</p>
                        <div class="flex gap-4 justify-center">
                            <button onclick="closePlayer()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition">Close</button>
                        </div>
                    </div>
                </div>
                <div id="playerLoader" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 hidden z-10">
                    <div class="loader-dots flex space-x-2 mb-4"><span class="w-3 h-3 bg-blue-500 rounded-full"></span><span class="w-3 h-3 bg-blue-500 rounded-full"></span><span class="w-3 h-3 bg-blue-500 rounded-full"></span></div>
                    <p class="text-blue-400 text-sm font-medium animate-pulse" id="loaderText">Searching for best signal...</p>
                </div>
            </div>
            <div class="p-4 bg-slate-900 border-t border-slate-800 flex justify-between items-center gap-4">
                <div class="flex items-center gap-3 overflow-hidden flex-1">
                    <div id="playerLogoWrap" class="w-10 h-10 rounded-lg relative overflow-hidden border border-slate-700/50 flex-shrink-0 bg-slate-800 hidden"></div>
                    <button id="playerFavBtn" onclick="togglePlayerFav()" class="flex-shrink-0 text-zinc-600 hover:text-amber-400 transition-all p-1.5 rounded-full" title="Favorite">
                        <i class="fas fa-star"></i>
                    </button>
                    <div class="overflow-hidden">
                        <h3 id="playerTitle" class="font-bold text-lg text-white truncate">Channel Name</h3>
                        <p id="playerUrl" class="text-xs text-white font-mono truncate mt-0.5 cursor-pointer hover:text-blue-400 transition-colors" title="Click to copy" onclick="copyToClipboard(this)">url...</p>
                        <div class="flex gap-3 mt-2 text-[10px] text-slate-400 font-mono uppercase tracking-wider items-center">
                            <span id="sourceIndicator" class="bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-900/50 flex items-center gap-1 hidden"><i class="fas fa-link"></i> <span id="sourceName">Direct</span></span>
                            <span id="metaRes" class="bg-slate-800 px-1.5 rounded hidden flex items-center gap-1 border border-slate-700"><i class="fas fa-expand"></i> <span id="metaResVal"></span></span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex bg-slate-800 rounded-lg p-0.5 gap-0.5 border border-slate-700 player-selector">
                        <button data-player="jw" onclick="switchPlayer('jw')" class="px-2 py-1.5 rounded-md text-xs font-medium transition player-btn active" title="JW Player"><i class="fas fa-play text-[10px]"></i> JW</button>
                        <button data-player="vjs" onclick="switchPlayer('vjs')" class="px-2 py-1.5 rounded-md text-xs font-medium transition player-btn" title="Video.js"><i class="fas fa-video text-[10px]"></i> VJS</button>
                        <button data-player="shaka" onclick="switchPlayer('shaka')" class="px-2 py-1.5 rounded-md text-xs font-medium transition player-btn" title="Shaka Player"><i class="fas fa-film text-[10px]"></i> Shaka</button>
                    </div>
                    <button onclick="closePlayer()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition flex items-center gap-2 border border-slate-600 shadow-sm hover:shadow-md flex-shrink-0"><i class="fas fa-reply"></i> <span class="hidden sm:inline">Back</span></button>
                </div>
            </div>
        </div>
    </dialog>

    <script>
    var jwpInstance = null;
    var vjsInstance = null;
    var vjsResTimer = null;
    var shakaInstance = null;
    var shakaUiInstance = null;
    var currentPlayerUrl = '';
    var currentPlayerTitle = '';
    var currentChannelLogo = '';
    var currentPosterUrl = '';
    var playTimeout = null;
    var currentPlayRequest = 0;
    var currentPlayer = 'jw';
    try { var sp = localStorage.getItem('p2_player'); if (sp && ['jw','vjs','shaka'].indexOf(sp) !== -1) currentPlayer = sp; } catch(e) {}
    var proxyMode = 2;
    var currentProxyIndex = 0;
    var topLogoHtml = '<img src="https://cdn.jsdelivr.net/gh/Sidimadtv/all/sidi/assets/images/logo.png" class="w-full h-full object-cover">';
    var proxyList = [
        { id: 'direct', name: 'Direct', url: function(u) { return u; } },
        { id: 'corsproxy', name: 'CORSProxy.io', url: function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); } },
        { id: 'allorigins', name: 'AllOrigins', url: function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); } },
        { id: 'thingproxy', name: 'ThingProxy', url: function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; } },
        { id: 'codetabs', name: 'CodeTabs', url: function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); } }
    ];

    if (typeof shaka !== 'undefined' && shaka.polyfill) { shaka.polyfill.installAll(); }

    function escapeStr(str) {
        if (!str) return '';
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ').replace(/\r/g, '');
    }

    function destroyPlayer() {
        if (vjsResTimer) { clearInterval(vjsResTimer); vjsResTimer = null; }
        if (jwpInstance) { try { jwpInstance.destroy(); } catch(e) {} jwpInstance = null; }
        if (vjsInstance) { try { vjsInstance.dispose(); } catch(e) {} vjsInstance = null; }
        if (shakaUiInstance) { try { shakaUiInstance.destroy(); } catch(e) {} shakaUiInstance = null; }
        if (shakaInstance) { try { shakaInstance.destroy(); } catch(e) {} shakaInstance = null; }
        shakaUiInstance = null;
    }

    function replaceVideoElement() {
        if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
        destroyPlayer();
        var container = document.getElementById('playerModal').querySelector('.relative');
        if (!container) return;
        var oldSel = container.querySelector('.vjs-quality-selector, .jw-top-logo');
        if (oldSel) oldSel.remove();
        var old = document.getElementById('playerContainer');
        if (old) old.remove();
        var fresh = document.createElement('div');
        fresh.id = 'playerContainer';
        fresh.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
        container.appendChild(fresh);
    }

    function updateLoaderText(text) {
        var loader = document.getElementById('loaderText');
        if (loader) loader.innerText = text;
    }

    function showError(title, desc) {
        document.getElementById('errorTitle').innerText = title;
        document.getElementById('errorDesc').innerText = desc;
        document.getElementById('errorViewContent').classList.remove('hidden');
        document.getElementById('playerLoader').classList.add('hidden');
        document.getElementById('playerError').classList.remove('hidden');
    }

    function updateJWRes() {
        try {
            if (!jwpInstance) return;
            var idx = jwpInstance.getCurrentQuality();
            var levels = jwpInstance.getQualityLevels();
            var lv = levels[idx];
            if (lv && (lv.width || lv.height)) {
                document.getElementById('metaResVal').innerText = (lv.width || '?') + 'x' + (lv.height || '?');
                document.getElementById('metaRes').classList.remove('hidden');
            }
        } catch(e) {}
    }

    function updateVJSRes() {
        try {
            if (!vjsInstance) return;
            var el = vjsInstance.el();
            var v = el.querySelector('.vjs-tech') || el.querySelector('video');
            if (v && v.videoWidth && v.videoHeight) {
                document.getElementById('metaResVal').innerText = v.videoWidth + 'x' + v.videoHeight;
                document.getElementById('metaRes').classList.remove('hidden');
            }
        } catch(e) {}
    }

    function updateShakaRes() {
        try {
            if (!shakaInstance) return;
            var tracks = shakaInstance.getVariantTracks();
            for (var i = 0; i < tracks.length; i++) {
                if (tracks[i].active && tracks[i].video && tracks[i].video.width && tracks[i].video.height) {
                    document.getElementById('metaResVal').innerText = tracks[i].video.width + 'x' + tracks[i].video.height;
                    document.getElementById('metaRes').classList.remove('hidden');
                    break;
                }
            }
        } catch(e) {}
    }

    function addVJSQualitySelector() {
        try {
            if (!vjsInstance || !vjsInstance.controlBar) return;
            var oldSel = vjsInstance.el().querySelector('.vjs-quality-selector');
            if (oldSel) return;
            var ql = typeof vjsInstance.qualityLevels === 'function' ? vjsInstance.qualityLevels() : null;
            var levels = [];
            if (ql && ql.length > 1) {
                for (var i = 0; i < ql.length; i++) {
                    if (!ql[i].height) continue;
                    levels.push({ label: ql[i].height + 'p', height: ql[i].height, index: i, level: ql[i] });
                }
            }
            if (levels.length < 2) {
                try {
                    var tech = vjsInstance.tech(true);
                    var vhs = tech && (tech.vhs || tech.hls);
                    if (vhs) {
                        var reps = vhs.playlistController_ && vhs.playlistController_.representations_;
                        if (!reps && typeof vhs.representations === 'function') reps = vhs.representations();
                        if (reps && reps.length > 1) {
                            var seen = {};
                            for (var j = 0; j < reps.length; j++) {
                                if (reps[j].contentType && reps[j].contentType !== 'video') continue;
                                var lbl = reps[j].height ? reps[j].height + 'p' : null;
                                if (!lbl || seen[lbl]) continue;
                                seen[lbl] = true;
                                levels.push({ label: lbl, height: reps[j].height, rep: reps[j], isVHS: true });
                            }
                        }
                    }
                } catch(e) {}
                if (levels.length < 2) return;
            }
            levels.sort(function(a, b) { return b.height - a.height; });
            var wrapper = document.createElement('div');
            wrapper.className = 'vjs-quality-selector vjs-control';
            wrapper.style.cssText = 'position:relative;display:flex;align-items:center;cursor:pointer;padding:0 8px;user-select:none;';
            var curLabel = document.createElement('span');
            curLabel.className = 'vjs-quality-current';
            curLabel.textContent = 'Auto';
            curLabel.style.cssText = 'color:#fff;font-size:12px;font-weight:700;text-shadow:0 0 2px rgba(0,0,0,0.8);';
            wrapper.appendChild(curLabel);
            var menu = document.createElement('div');
            menu.className = 'vjs-quality-menu';
            menu.style.cssText = 'display:none;position:absolute;bottom:100%;right:0;background:rgba(28,28,28,0.95);border-radius:4px;overflow:hidden;min-width:80px;z-index:10;margin-bottom:4px;';
            var setQuality = function(lbl, idx) {
                if (ql && ql.length > 1) {
                    for (var k = 0; k < ql.length; k++) { try { ql[k].enabled = idx === -1 || k === idx; } catch(e) {} }
                }
                if (levels[0] && levels[0].isVHS) {
                    for (var m = 0; m < levels.length; m++) {
                        if (levels[m].rep && levels[m].rep.enabled) levels[m].rep.enabled(idx === -1 || m === idx);
                    }
                }
                curLabel.textContent = lbl;
                menu.style.display = 'none';
            };
            var autoBtn = document.createElement('button');
            autoBtn.textContent = 'Auto';
            autoBtn.style.cssText = 'display:block;width:100%;padding:6px 12px;background:none;border:none;color:#fff;font-size:12px;cursor:pointer;text-align:left;white-space:nowrap;';
            autoBtn.onclick = function(e) { e.stopPropagation(); setQuality('Auto', -1); };
            menu.appendChild(autoBtn);
            levels.forEach(function(lvl) {
                var btn = document.createElement('button');
                btn.textContent = lvl.label;
                btn.style.cssText = 'display:block;width:100%;padding:6px 12px;background:none;border:none;color:#fff;font-size:12px;cursor:pointer;text-align:left;white-space:nowrap;';
                btn.onclick = function(e) { e.stopPropagation(); setQuality(lvl.label, lvl.index); };
                menu.appendChild(btn);
            });
            wrapper.appendChild(menu);
            wrapper.onclick = function(e) { e.stopPropagation(); menu.style.display = menu.style.display === 'none' ? 'block' : 'none'; };
            var controlBar = vjsInstance.controlBar.el();
            var fsBtn = controlBar.querySelector('.vjs-fullscreen-control');
            if (fsBtn) controlBar.insertBefore(wrapper, fsBtn);
            else controlBar.appendChild(wrapper);
        } catch(e) {}
    }

    function injectTopLogo() {
        if (!topLogoHtml) return;
        var wrapper;
        if (currentPlayer === 'vjs' && vjsInstance && vjsInstance.el) {
            wrapper = vjsInstance.el();
        } else if (currentPlayer === 'shaka') {
            wrapper = document.querySelector('#playerContainer .shaka-video-container') || document.getElementById('playerContainer');
        } else {
            wrapper = document.getElementById('playerContainer');
        }
        if (!wrapper) return;
        var old = wrapper.querySelector('.jw-top-logo');
        if (old) old.remove();
        var el = document.createElement('div');
        el.className = 'jw-top-logo';
        el.innerHTML = topLogoHtml;
        el.style.cssText = 'position:absolute;top:16px;left:16px;z-index:9999;width:100px;height:100px;overflow:hidden;cursor:pointer;animation:spin 8s linear infinite;filter:drop-shadow(0 0 10px rgba(0,0,0,0.5));';
        el.onclick = function() { if (currentChannelLogo) window.open(currentChannelLogo, '_blank'); };
        wrapper.appendChild(el);
    }

    function updatePlayerBtns() {
        document.querySelectorAll('.player-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.player === currentPlayer); });
    }

    function launchPlayer(url) {
        document.getElementById('metaRes').classList.add('hidden');
        replaceVideoElement();
        if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
        if (currentPlayer === 'jw') setupJWPlayer(url);
        else if (currentPlayer === 'vjs') setupVideoJS(url);
        else if (currentPlayer === 'shaka') setupShakaPlayer(url);
    }

    function switchPlayer(type) {
        if (type === currentPlayer) return;
        currentPlayer = type;
        try { localStorage.setItem('p2_player', type); } catch(e) {}
        updatePlayerBtns();
        var pm = document.getElementById('playerModal');
        if (pm && pm.open) launchPlayer(currentPlayerUrl);
    }

    function setupJWPlayer(url) {
        if (typeof jwplayer !== 'function') { showError('JW Player Error', 'JW Player library not loaded'); return; }
        jwpInstance = jwplayer('playerContainer');
        jwpInstance.setup({
            file: url,
            width: '100%',
            height: '100%',
            autostart: true,
            controls: true,
            logo: { hide: true }
        });
        jwpInstance.on('levels', updateJWRes);
        jwpInstance.on('qualityChange', updateJWRes);
        jwpInstance.on('ready', function() {
            document.getElementById('playerLoader').classList.add('hidden');
            try {
                var v = jwpInstance.getContainer().querySelector('video');
                if (v && currentPosterUrl) v.poster = currentPosterUrl;
            } catch(e) {}
            injectTopLogo();
            jwpInstance.on('play', function() { if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; } });
            playTimeout = setTimeout(function() {
                try { if (jwpInstance && jwpInstance.getState && jwpInstance.getState() === 'playing') { playTimeout = null; return; } } catch(e) {}
                showError('Playback Timeout', 'Stream did not start within 15 seconds');
            }, 15000);
        });
        jwpInstance.on('setupError', function(e) { if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; } showError('Setup Error', e.message || 'Player setup failed'); });
        jwpInstance.on('error', function(e) { if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; } showError('Playback Error', e.message || 'Failed to load stream'); });
    }

    function setupVideoJS(url) {
        var container = document.getElementById('playerContainer');
        if (!container) return;
        var video = document.createElement('video');
        video.className = 'video-js vjs-default-skin vjs-big-play-centered';
        video.style.cssText = 'width:100%;height:100%;';
        container.appendChild(video);
        video.addEventListener('play', function() { if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; } }, { once: true });
        try {
            vjsInstance = videojs(video, {
                controls: true,
                autoplay: true,
                preload: 'auto',
                fluid: false,
                html5: { hls: { overrideNative: true } },
                sources: [{ src: url, type: 'application/x-mpegURL' }]
            }, function() {
                document.getElementById('playerLoader').classList.add('hidden');
                try { if (currentPosterUrl) this.poster(currentPosterUrl); } catch(e) {}
                injectTopLogo();
                vjsInstance.on('play', function() { if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; } });
                playTimeout = setTimeout(function() {
                    try { if (vjsInstance && !vjsInstance.paused()) { playTimeout = null; return; } } catch(e) {}
                    showError('Playback Timeout', 'Stream did not start within 15 seconds');
                }, 15000);
            });
            updateVJSRes();
            if (vjsResTimer) clearInterval(vjsResTimer);
            vjsResTimer = setInterval(updateVJSRes, 1500);
            setTimeout(addVJSQualitySelector, 1000);
            var vjsQlTry = 0;
            var vjsQlTimer = setInterval(function() {
                addVJSQualitySelector();
                if (vjsInstance.el().querySelector('.vjs-quality-selector') || ++vjsQlTry > 15) clearInterval(vjsQlTimer);
            }, 2000);
            vjsInstance.on('error', function() {
                if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
                var err = vjsInstance.error(); showError('Video.js Error', (err && err.message) || 'Failed to load stream');
            });
        } catch(e) { showError('Video.js Error', e.message); }
    }

    function setupShakaPlayer(url) {
        var container = document.getElementById('playerContainer');
        if (!container) return;
        try {
            if (typeof shaka === 'undefined' || !shaka.Player) { showError('Shaka Error', 'Shaka Player not loaded'); return; }
            var video = document.createElement('video');
            video.className = 'shaka-video';
            video.style.cssText = 'width:100%;height:100%;';
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.setAttribute('preload', 'auto');
            var uiContainer = document.createElement('div');
            uiContainer.className = 'shaka-video-container';
            uiContainer.style.cssText = 'width:100%;height:100%;position:relative;';
            container.appendChild(uiContainer);
            uiContainer.appendChild(video);
            var player = new shaka.Player(video);
            player.configure({
                streaming: {
                    bufferingGoal: 30,

                        if (c.cmd) {
                            var m = c.cmd.match(/ffmpeg\s+(.+)/i);
                            streamUrl = m ? m[1].trim() : c.cmd.trim();
                            if (streamUrl.indexOf('http') !== 0) streamUrl = result.base.replace('/load.php', '') + '/' + streamUrl.replace(/^\//, '');
                        } else if (c.url) {
                            streamUrl = c.url;
                        }
                        if (!streamUrl || seen[streamUrl]) return;
                        seen[streamUrl] = true;
                        channels.push({
                            name: c.name || 'Channel ' + (c.number || ''),
                            url: streamUrl,
                            logo: c.logo || '',
                            group: c.tv_genre && c.tv_genre[0] ? c.tv_genre[0] : (c.tv_genre_id && c.tv_genre_id[0] ? String(c.tv_genre_id[0]) : c.genre || 'MAG Portal'),
                            id: Math.random().toString(36).substr(2, 9),
                        });
                    });
                    if (!channels.length) { throw new Error('No playable streams found'); }
                    var name = 'MAG: ' + (portalUrl.replace(/https?:\/\//, '').split('/')[0] || 'Portal');
                    var parsed = { name: name, channels: channels, groups: Array.from(new Set(channels.map(function(c) { return c.group; }))).sort() };
                    setPlaylist(parsed);
                    savePlaylistToLS(parsed);
                    addToSavedPlaylists(parsed);
                } catch (err) {
                    setLoadError('Portal: ' + err.message);
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            };

            var favCount = favorites.length;
            var recentList = recent;

            const filteredChannels = useMemo(function() {
                if (!playlist) return [];
                return playlist.channels.filter(function(ch) {
                    var matchesGroup = activeGroup === 'All' ? true : activeGroup === '__fav__' ? favorites.indexOf(ch.url) !== -1 : ch.group === activeGroup;
                    var matchesSearch = ch.name.toLowerCase().indexOf(searchQuery.toLowerCase()) !== -1;
                    return matchesGroup && matchesSearch;
                });
            }, [playlist, activeGroup, searchQuery, favorites]);

            var allGroups = playlist ? playlist.groups : [];
            var sidebarGroups = ['__fav__'].concat(allGroups);

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-black">
                    <div className="flex flex-1 overflow-hidden relative">
                        {isSidebarOpen && <div className="sidebar-overlay block md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}

                        {playlist && (
                            <aside className={`${isSidebarOpen ? 'w-72' : 'w-0'} md:w-72 bg-zinc-950 border-r border-zinc-800 transition-all duration-300 flex flex-col z-50 sidebar-mobile ${!isSidebarOpen && 'md:w-0'}`}>
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center">
                                    <h1 className="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">S!d!m@D™️TV</h1>
                                    <button className="md:hidden text-zinc-500" onClick={() => setIsSidebarOpen(false)}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-1">
                                    <button onClick={() => selectGroup('All')} className={'w-full text-left px-4 py-3 rounded-xl transition-all text-sm font-medium ' + (activeGroup === 'All' ? 'bg-indigo-600 text-white shadow-lg' : 'text-zinc-500 hover:bg-zinc-900')}>
                                        All Channels
                                    </button>
                                    <button onClick={() => selectGroup('__fav__')} className={'w-full text-left px-4 py-3 rounded-xl transition-all text-sm font-medium ' + (activeGroup === '__fav__' ? 'bg-amber-600 text-white shadow-lg' : 'text-zinc-500 hover:bg-zinc-900')}>
                                        <span className="flex items-center gap-2"><svg className="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Favorites <span className="text-[10px] opacity-60">({favCount})</span></span>
                                    </button>
                                    <div className="h-px bg-zinc-800 my-2"></div>
                                    {allGroups.map(function(group) {
                                        return <button key={group} onClick={() => selectGroup(group)} className={'w-full text-left px-4 py-3 rounded-xl transition-all text-sm truncate font-medium ' + (activeGroup === group ? 'bg-indigo-600 text-white shadow-lg' : 'text-zinc-500 hover:bg-zinc-900')}>{group}</button>;
                                    })}
                                </div>
                                <div className="p-4 border-t border-zinc-800 space-y-2">
                                    <div className="flex gap-2">
                                        <button onClick={exportFavs} className="flex-1 text-zinc-500 hover:text-amber-400 text-[9px] uppercase tracking-widest font-bold px-2 py-2 bg-zinc-900/50 rounded-xl transition-colors flex items-center justify-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> Fav</button>
                                        <button onClick={exportPlaylist} className="flex-1 text-zinc-500 hover:text-blue-400 text-[9px] uppercase tracking-widest font-bold px-2 py-2 bg-zinc-900/50 rounded-xl transition-colors flex items-center justify-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Backup</button>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={function() { document.getElementById('favImport').click(); }} className="flex-1 text-zinc-500 hover:text-amber-400 text-[9px] uppercase tracking-widest font-bold px-2 py-2 bg-zinc-900/50 rounded-xl transition-colors flex items-center justify-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L5 8m4-4v12"/></svg> Fav In</button>
                                        <button onClick={function() { document.getElementById('playlistImport').click(); }} className="flex-1 text-zinc-500 hover:text-blue-400 text-[9px] uppercase tracking-widest font-bold px-2 py-2 bg-zinc-900/50 rounded-xl transition-colors flex items-center justify-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L5 8m4-4v12"/></svg> Restore</button>
                                    </div>
                                    <input type="file" id="favImport" accept=".json" className="hidden" onChange={importFavs} />
                                    <input type="file" id="playlistImport" accept=".json" className="hidden" onChange={importPlaylist} />
                                    <div className="pt-1 border-t border-zinc-800/50">
                                        <div className="flex items-center justify-between mb-1">
                                            <span className="text-[9px] uppercase tracking-widest font-bold text-zinc-500">Playlists</span>
                                            <button onClick={saveCurrentPlaylist} className="text-[9px] text-indigo-400 hover:text-indigo-300 font-bold uppercase tracking-widest">+ Save</button>
                                        </div>
                                        <div className="max-h-28 overflow-y-auto space-y-0.5">
                                            {savedPlaylists.map(function(p) {
                                                var isCur = playlist && playlist.name === p.name;
                                                return <div key={p.name} className={'flex items-center gap-1 rounded-lg transition ' + (isCur ? 'bg-indigo-600/20' : 'hover:bg-zinc-900')}>
                                                    <button onClick={function() { loadSavedPlaylist(p); if (window.innerWidth < 768) setIsSidebarOpen(false); }} className={'flex-1 text-left truncate px-2.5 py-2 text-[10px] font-medium ' + (isCur ? 'text-indigo-300' : 'text-zinc-400 hover:text-white')}>{p.name}</button>
                                                    <button onClick={function() { deleteSavedPlaylist(p.name); }} className="p-1.5 text-zinc-600 hover:text-red-400 transition rounded mr-1"><svg className="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
                                                </div>;
                                            })}
                                            {savedPlaylists.length === 0 && <p className="text-[9px] text-zinc-600 text-center py-2">No saved playlists</p>}
                                        </div>
                                        <button onClick={function() { setPlaylist(null); setSelectedChannel(null); setPlaylistUrl(''); try { localStorage.removeItem('p2_playlist'); } catch(e) {} if (window.innerWidth < 768) setIsSidebarOpen(false); }} className="mt-1.5 text-zinc-500 hover:text-white text-[9px] uppercase tracking-widest font-bold flex items-center justify-center gap-1 px-3 py-2 bg-zinc-900/50 rounded-lg w-full transition-colors">
                                            + New Playlist
                                        </button>
                                    </div>
                                </div>
                            </aside>
                        )}

                        <main className="flex-1 flex flex-col overflow-hidden relative">
                            <header className="h-16 border-b border-zinc-800 flex items-center justify-between px-4 md:px-6 glass-header z-30">
                                <div className="flex items-center gap-2 md:gap-4 overflow-hidden">
                                    {playlist && (
                                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-zinc-800 rounded-lg shrink-0">
                                            <svg className="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                                        </button>
                                    )}
                                    <h2 className="font-bold text-sm md:text-lg truncate">{playlist ? playlist.name : 'Welcome to S!d!m@D-TV'}</h2>
                                </div>
                                {playlist && (
                                    <div className="flex items-center gap-2 flex-1 justify-end ml-2">
                                        <div className="relative max-w-[100px] md:max-w-[200px]">
                                            <input type="text" placeholder="🔎Search..." className="bg-zinc-900 border border-zinc-800 rounded-full px-4 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full transition-all" value={searchQuery} onChange={function(e) { setSearchQuery(e.target.value); }} />
                                        </div>
                                        {selectedChannel && (
                                            <button onClick={function() { toggleFavorite(selectedChannel); }} className={'p-1.5 rounded-full transition-all ' + (favorites.indexOf(selectedChannel.url) !== -1 ? 'text-amber-400' : 'text-zinc-600 hover:text-amber-400')} title="Toggle favorite">
                                                <svg className="w-4 h-4 md:w-5 md:h-5" fill={favorites.indexOf(selectedChannel.url) !== -1 ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                            </button>
                                        )}
                                    </div>
                                )}
                            </header>

                            <div className="flex-1 overflow-y-auto relative scroll-smooth">
                                {!playlist ? (
                                    <div className="h-full flex flex-col items-center justify-center p-6 relative">
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[280px] md:w-[500px] h-[280px] md:h-[500px] bg-indigo-600/10 blur-[80px] md:blur-[120px] rounded-full animate-pulse"></div>

                                       <div className="relative z-10 w-full max-w-md space-y-8 animate-fade-in text-center">
                                            <div>
                                                <h1 className="text-3xl md:text-5xl font-black mb-3">S!d!m@D™️</h1>
                                                <p className="text-zinc-500 text-sm md:text-base leading-relaxed">Select an input method to load your TV channels</p>
                                            </div>

                                            <div className="space-y-4">
                                                <form onSubmit={handleUrlSubmit} className="relative group">
                                                    <input type="url" placeholder="Enter or Paste M3U Url..." className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-zinc-700" value={playlistUrl} onChange={function(e) { setPlaylistUrl(e.target.value); }} disabled={isLoading} />
                                                    <button type="submit" disabled={isLoading || !playlistUrl} className="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-zinc-800 text-white font-bold px-4 rounded-xl transition-all text-xs">{isLoading ? 'Loading...' : 'Load The URL'}</button>
                                                </form>

                                                <div className="flex items-center gap-4 text-zinc-800 py-2">
                                                    <div className="h-px bg-zinc-900 flex-1"></div>
                                                    <span className="text-[10px] font-bold uppercase tracking-widest">Or</span>
                                                    <div className="h-px bg-zinc-900 flex-1"></div>
                                                </div>

                                                <label className="block w-full bg-zinc-900 border border-zinc-800 text-zinc-400 font-bold px-8 py-4 rounded-2xl cursor-pointer hover:bg-zinc-800 transition-all shadow-xl text-sm active:scale-[0.98]">
                                                    Upload M3U File
                                                    <input type="file" className="hidden" accept=".m3u" onChange={handleFileUpload} />
                                                </label>

                                                <div className="flex items-center gap-4 text-zinc-800 py-2">
                                                    <div className="h-px bg-zinc-900 flex-1"></div>
                                                    <span className="text-[10px] font-bold uppercase tracking-widest">Or</span>
                                                    <div className="h-px bg-zinc-900 flex-1"></div>
                                                </div>

                                                <form onSubmit={handlePortalSubmit} className="space-y-3">
                                                    <input type="url" placeholder="Portal URL (e.g. http://portal.com)" className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-zinc-700" value={portalUrl} onChange={function(e) { setPortalUrl(e.target.value); }} disabled={isLoading} />
                                                    <div className="flex gap-2">
                                                        <input type="text" placeholder="MAC Address (00:1A:79:XX:XX:XX)" className="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-zinc-700 font-mono tracking-wider uppercase" value={portalMac} onChange={function(e) { setPortalMac(e.target.value); }} disabled={isLoading} maxLength={17} />
                                                        <button type="submit" disabled={isLoading || !portalUrl || !portalMac} className="px-5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-800 text-white font-bold rounded-2xl transition-all text-xs shrink-0">{isLoading ? 'Loading...' : 'Load Portal'}</button>
                                                    </div>
                                                </form>

                                                {loadError && <div className="text-red-500 text-xs font-medium text-left whitespace-pre-wrap max-h-32 overflow-y-auto bg-red-900/10 rounded-xl p-3 border border-red-900/20">{loadError}</div>}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                    <div className="flex flex-col min-h-full">
                                        <div className="p-4 md:p-10 space-y-6 md:space-y-8 max-w-7xl mx-auto w-full">
                                            <div className="flex items-center justify-between">
                                                <h3 className="text-lg md:text-2xl font-bold truncate pr-2">{activeGroup === 'All' ? 'Featured Channels' : activeGroup === '__fav__' ? '⭐ Favorites' : activeGroup}</h3>
                                                <span className="bg-zinc-900 px-3 py-1 rounded-full text-zinc-500 text-[10px] md:text-sm font-mono shrink-0 border border-zinc-800">{filteredChannels.length} TV</span>
                                            </div>

                                            {activeGroup === 'All' && recentList.length > 0 && (
                                                <div>
                                                    <h4 className="text-xs text-zinc-500 uppercase tracking-wider font-bold mb-3 flex items-center gap-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Recently Watched</h4>
                                                    <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                                                        {recentList.map(function(r) {
                                                            return <button key={r.url} onClick={function() {
                                                                var ch = playlist.channels.find(function(c) { return c.url === r.url; });
                                                                if (ch) { setSelectedChannel(ch); if (window.innerWidth < 768) setIsSidebarOpen(false); window.playChannel(ch); }
                                                            }} className="flex-shrink-0 w-20 bg-zinc-900/60 rounded-xl p-2 border border-zinc-800 hover:border-zinc-600 transition text-center">
                                                                <div className="w-full aspect-square bg-zinc-800 rounded-lg mb-1 flex items-center justify-center overflow-hidden text-[10px] font-bold text-zinc-600">{r.logo ? <img src={r.logo} className="w-full h-full object-contain p-1" onError={function(e) { e.target.style.display='none'; }} /> : (r.name ? r.name[0] : '?')}</div>
                                                                <div className="text-[8px] text-zinc-500 truncate">{r.name}</div>
                                                            </button>;
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4">
                                                {filteredChannels.map(function(ch) {
                                                    var isFav = favorites.indexOf(ch.url) !== -1;
                                                    return <button key={ch.id} onClick={function() { setSelectedChannel(ch); if (window.innerWidth < 768) setIsSidebarOpen(false); window.playChannel(ch); }} className={'group p-2.5 rounded-xl border transition-all text-center flex flex-col items-center relative ' + (selectedChannel && selectedChannel.id === ch.id ? 'bg-indigo-600/10 border-indigo-500 shadow-lg' : 'bg-zinc-900/40 border-zinc-800 hover:border-zinc-600 hover:bg-zinc-900')}>
                                                        <button onClick={function(e) { e.stopPropagation(); toggleFavorite(ch); }} className={'absolute top-1 right-1 z-10 p-1 rounded-full transition-all ' + (isFav ? 'text-amber-400 opacity-100' : 'text-zinc-600 opacity-0 group-hover:opacity-100 hover:text-amber-400')}>
                                                            <svg className="w-3.5 h-3.5" fill={isFav ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                                        </button>
                                                        <div className="w-full aspect-square bg-zinc-800 rounded-lg mb-2 flex items-center justify-center overflow-hidden relative shadow-inner">
                                                            {ch.logo ? <img src={ch.logo} className="w-full h-full object-contain p-2" loading="lazy" onError={function(e) { e.target.style.opacity='0'; }} /> : <span className="text-2xl md:text-3xl font-bold text-zinc-700">{ch.name[0]}</span>}
                                                            <div className="absolute inset-0 bg-indigo-600/0 group-hover:bg-indigo-600/10 transition-colors flex items-center justify-center">
                                                                <div className="w-8 h-8 bg-indigo-600 rounded-full opacity-0 group-hover:opacity-100 transition-all transform scale-50 group-hover:scale-100 flex items-center justify-center shadow-lg">
                                                                    <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] md:text-xs font-semibold line-clamp-2 text-zinc-300 group-hover:text-white leading-tight">{ch.name}</span>
                                                    </button>;
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    </>
                                )}
                            </div>
                        </main>
                    </div>

                    <footer className="w-full py-3 border-t border-zinc-900 glass-header text-center z-50">
                        <p className="text-[9px] md:text-xs text-zinc-600 tracking-wider uppercase font-bold px-4">
                            (c)2026 - <span className="text-zinc-400">S!dim@D</span> | By: <span className="text-indigo-400">Lov</span>
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
